name: bangtori
description: Bang Tori - 공동 생활 관리 서비스

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  provider: ^6.1.1

  # 네트워킹
  http: ^1.1.2
  dio: ^5.4.0

  # 소셜 로그인
  google_sign_in: ^6.2.1
  kakao_flutter_sdk_user: ^1.9.1+2
  flutter_naver_login: ^1.8.0

  # 로컬 저장소
  shared_preferences: ^2.2.2

  # UI/UX
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # 유틸리티
  intl: ^0.19.0
  uuid: ^4.2.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/